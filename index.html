<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyManager - Survival Kit Mahasiswa</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.05);
            --text-light: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, var(--bg-color));
            color: var(--text-light);
            min-height: 100vh;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            padding: 10px 25px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px 10%;
            gap: 40px;
        }

        .hero-text { flex: 1; }
        .hero-text h1 { font-size: 4rem; line-height: 1.1; margin-bottom: 20px; }
        .hero-text span { color: var(--accent); }
        .hero-text p { font-size: 1.1rem; opacity: 0.7; line-height: 1.6; max-width: 500px; }

        /* Dashboard Card */
        .dashboard-preview {
            flex: 1;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            height: 100px;
            margin-bottom: 20px;
        }

        .bar { background: var(--accent); width: 100%; border-radius: 4px; transition: 0.5s; }

    </style>
</head>
<body>

<nav>
    <div class="logo">🎓 MyManager</div>
    <div class="nav-links">
        <a href="#">Keuangan</a>
        <a href="#">Reminder WA</a>
        <a href="#">Login</a>
        <a href="#" class="btn-primary">Daftar Akun</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-text">
        <div style="background: var(--glass); display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 20px;">⚡ Survival Kit Mahasiswa</div>
        <h1>Kuliah Santai, <br>IPK Tetap <span>Badai.</span></h1>
        <p>Platform all-in-one buat kamu yang capek dikejar deadline. Atur tugas, uang saku, dan jadwal dalam satu aplikasi pintar.</p>
        <br>
        <a href="#" class="btn-primary" style="font-size: 1.2rem; padding: 15px 40px;">Gas Mulai 🚀</a>
    </div>

    <div class="dashboard-preview">
        <div style="display:flex; gap:5px; margin-bottom: 20px;">
            <div style="width:12px; height:12px; border-radius:50%; background:#ff5f56;"></div>
            <div style="width:12px; height:12px; border-radius:50%; background:#ffbd2e;"></div>
            <div style="width:12px; height:12px; border-radius:50%; background:#27c93f;"></div>
        </div>
        
        <small style="opacity: 0.5;">Statistik Tugas</small>
        <div class="bar-chart">
            <div class="bar" style="height: 40%;"></div>
            <div class="bar" style="height: 70%;"></div>
            <div class="bar" style="height: 50%;"></div>
            <div class="bar" style="height: 90%;"></div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <span style="font-size: 1.5rem;">💳</span>
                <div style="margin-top:10px; font-weight: bold;">Rp 500rb</div>
            </div>
            <div class="stat-card">
                <span style="font-size: 1.5rem;">📝</span>
                <div style="margin-top:10px; font-weight: bold;">3 Tugas</div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
