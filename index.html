<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahasiswa Hub | Dashboard</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .app-card { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; background: #e2e8f0; }
        .tab-btn.active { background: var(--primary); color: white; }

        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button.main-btn { width: 100%; padding: 12px; background: #059669; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Finance Bar */
        .budget-container { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .progress-bg { background: #cbd5e1; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-fill { background: #ef4444; height: 100%; width: 0%; transition: 0.5s; }

        .list-container { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .item { background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
        .item small { color: #64748b; display: block; margin-top: 4px; }
    </style>
</head>
<body>

<div class="app-card">
    <h2 style="margin-top:0">🎓 Mahasiswa Hub</h2>
    
    <div class="tabs">
        <button id="btn-sch" class="tab-btn active" onclick="switchTab('sch')">Schedule</button>
        <button id="btn-fin" class="tab-btn" onclick="switchTab('fin')">Finance</button>
    </div>

    <div id="section-sch">
        <div class="input-group">
            <input type="text" id="majorName" placeholder="Major Name (e.g. Data Structure)">
            <input type="text" id="majorUpdate" placeholder="What's the update today?">
            <button class="main-btn" onclick="addItem('sch')" style="margin-top:10px">Log Today's Update</button>
        </div>
        <div id="list-sch" class="list-container"></div>
    </div>

    <div id="section-fin" style="display:none">
        <div class="budget-container">
            <span>Monthly Spend: <strong>Rp <span id="total-spent">0</span></strong></span>
            <div class="progress-bg"><div id="bar" class="progress-fill"></div></div>
        </div>
        <div class="input-group">
            <input type="number" id="amount" placeholder="Amount (e.g. 50000)">
            <input type="text" id="note" placeholder="Expense for? (e.g. Lunch)">
            <button class="main-btn" onclick="addItem('fin')" style="margin-top:10px; background: #2563eb;">Add Expense</button>
        </div>
        <div id="list-fin" class="list-container"></div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('mhs_data')) || { schedule: [], finance: [] };
    const limit = 2000000; // Monthly limit example (2 Million)

    function switchTab(type) {
        document.getElementById('section-sch').style.display = type === 'sch' ? 'block' : 'none';
        document.getElementById('section-fin').style.display = type === 'fin' ? 'block' : 'none';
        document.getElementById('btn-sch').classList.toggle('active', type === 'sch');
        document.getElementById('btn-fin').classList.toggle('active', type === 'fin');
        render();
    }

    function addItem(type) {
        const date = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
        if (type === 'sch') {
            const name = document.getElementById('majorName').value;
            const up = document.getElementById('majorUpdate').value;
            if(name && up) data.schedule.unshift({ name, up, date });
        } else {
            const amt = parseInt(document.getElementById('amount').value);
            const note = document.getElementById('note').value;
            if(amt) data.finance.unshift({ amt, note, date });
        }
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('mhs_data', JSON.stringify(data));
        render();
        // Clear inputs
        document.querySelectorAll('input').forEach(i => i.value = '');
    }

    function render() {
        // Render Schedule
        document.getElementById('list-sch').innerHTML = data.schedule.map(i => `
            <div class="item"><strong>${i.name}</strong>: ${i.up}<small>${i.date}</small></div>
        `).join('');

        // Render Finance
        const total = data.finance.reduce((sum, i) => sum + i.amt, 0);
        document.getElementById('total-spent').innerText = total.toLocaleString('id-ID');
        document.getElementById('list-fin').innerHTML = data.finance.map(i => `
            <div class="item"><strong>Rp ${i.amt.toLocaleString('id-ID')}</strong> - ${i.note}<small>${i.date}</small></div>
        `).join('');
        
        // Update Bar
        const percent = Math.min((total / limit) * 100, 100);
        document.getElementById('bar').style.width = percent + '%';
    }

    render(); // Initial load
</script>

</body>
</html>
